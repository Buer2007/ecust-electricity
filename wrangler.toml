name = "ecust-electricity"
main = "worker.js"
compatibility_date = "2024-04-05"

# --- 静态资源托管 ---
[site]
bucket = "./dist"

# --- D1 数据库配置 ---
[[d1_databases]]
binding = "DB"
database_name = "electric-db"
database_id = "92c33fdc-6a07-4f50-8cae-c7b4c09209d8"

# --- 定时任务 (Cron) ---
[triggers]
crons = ["0 * * * *"]

# --- 环境变量 (默认值) ---
[vars]
ROOM_ID = "612"
PART_ID = "奉贤"
BUILD_ID = "1"